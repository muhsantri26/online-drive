<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Online Drive - Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-100 h-screen">
  <div class="max-w-7xl mx-auto h-full p-4 flex gap-4">
    <!-- Sidebar -->
    <aside class="w-72 bg-white rounded-lg shadow p-4 flex flex-col">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">My Drive</h2>
        <button id="btnNewFolder" class="text-sm bg-blue-500 text-white px-3 py-1 rounded">Folder+</button>
      </div>
      <div class="flex-1 overflow-auto" id="sidebarTree"></div>
      <div class="mt-4 text-xs text-gray-500">Local demo - data disimpan di localStorage</div>
    </aside>

    <!-- Main -->
    <main class="flex-1 bg-white rounded-lg shadow p-4 flex flex-col">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <nav id="breadcrumb" class="text-sm text-gray-600"></nav>
          <input id="search" placeholder="Cari file atau folder" class="border rounded px-2 py-1 text-sm" />
        </div>
        <div class="flex items-center gap-2">
          <label class="bg-green-500 text-white px-3 py-1 rounded cursor-pointer text-sm">
            Upload File
            <input id="fileInput" type="file" class="hidden" />
          </label>
          <label class="bg-orange-500 text-white px-3 py-1 rounded cursor-pointer text-sm">
            Upload Folder
            <input id="folderInput" type="file" class="hidden" webkitdirectory multiple />
          </label>
          <button id="btnRefresh" class="bg-gray-200 px-3 py-1 rounded text-sm">Refresh</button>
        </div>
      </div>

      <div id="mainContent" class="flex-1 overflow-auto">
        <!-- Grid/list of items will be rendered here -->
      </div>

      <!-- Progress Bar -->
      <div id="progressContainer" class="hidden mt-4">
        <div class="bg-gray-200 rounded-full h-3">
          <div id="progressBar" class="bg-blue-500 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
        <p id="progressText" class="text-sm mt-2 text-gray-600">Memproses...</p>
      </div>
    </main>

        <!-- Preview Modal -->
        <div id="previewModal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center hidden z-50">
          <div class="bg-white rounded-lg overflow-auto max-w-4xl w-full p-4 relative">
            <button id="previewClose" class="absolute top-2 right-2 text-gray-600">✕</button>
            <div id="previewBody" class="flex items-center justify-center"></div>
          </div>
        </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
